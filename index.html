<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pam Premium — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f8fa;font-family:'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif;color:#111827}
.card{background:#fff;border:1px solid #eceef2;border-radius:20px;box-shadow:0 4px 18px rgba(16,24,40,.07);padding:34px 30px;width:min(92vw,380px);text-align:center}
.logo{width:52px;height:52px;border-radius:14px;background:#0caf60;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
h1{font-size:19px;margin:0 0 4px}
p{color:#68727f;font-size:13.5px;margin:0 0 20px}
input[type=password]{width:100%;box-sizing:border-box;padding:13px 14px;border:1.5px solid #d8dde5;border-radius:12px;font-size:16px;font-family:inherit;outline:none}
input[type=password]:focus{border-color:#0caf60}
label{display:flex;align-items:center;gap:8px;font-size:13.5px;color:#68727f;margin:14px 0 18px;justify-content:center}
button{width:100%;padding:13px;border:0;border-radius:12px;background:#0caf60;color:#fff;font-size:15.5px;font-weight:700;font-family:inherit;cursor:pointer}
button:active{background:#0a9a55}
.err{color:#f04438;font-size:13px;margin-top:12px;display:none}
.spin{display:none;margin-top:12px;color:#68727f;font-size:13px}
</style></head><body>
<div class="card">
 <div class="logo">P</div>
 <h1>Pam Premium Dashboard</h1>

const b2a=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function tryOpen(pw,silent){
 if(!pw)return false;
 document.getElementById('spin').style.display='block';
 try{
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(B.s),iterations:B.i,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(B.n)},key,b2a(B.c));
  if(document.getElementById('rem').checked)localStorage.setItem('pamdash_pw',pw);
  const html=new TextDecoder().decode(pt);
  document.open();document.write(html);document.close();
  return true;
 }catch(e){
  document.getElementById('spin').style.display='none';
  if(!silent){document.getElementById('err').style.display='block';}
  return false;
 }
}
document.getElementById('go').onclick=()=>tryOpen(document.getElementById('pw').value,false);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryOpen(e.target.value,false);});
(async()=>{
 const h=location.hash.match(/k=([^&]+)/);
 if(h&&await tryOpen(decodeURIComponent(h[1]),true))return;
 const saved=localStorage.getItem('pamdash_pw');
 if(saved&&!(await tryOpen(saved,true)))localStorage.removeItem('pamdash_pw');
})();
